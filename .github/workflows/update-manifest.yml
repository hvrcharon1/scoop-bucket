name: Update Manifest

on:
  repository_dispatch:
    types: [update-manifest]

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Update manifest
        env:
          VERSION: ${{ github.event.client_payload.version }}
        run: |
          set -e
          BASE_URL="https://github.com/hvrcharon1/agentdb/releases/download/v${VERSION}"

          curl -sL "${BASE_URL}/checksums-sha256.txt" -o checksums.txt
          SHA_WIN=$(grep 'x86_64-pc-windows-msvc' checksums.txt | awk '{print $1}')

          python3 -c "
          import json
          manifest = {
              'version': '${VERSION}',
              'description': 'Single-file embedded database for AI agents — SQL + Vector Search + FTS + Graphs',
              'homepage': 'https://github.com/hvrcharon1/agentdb',
              'license': 'Unlicense',
              'architecture': {
                  '64bit': {
                      'url': '${BASE_URL}/agentdb-x86_64-pc-windows-msvc.zip',
                      'hash': '${SHA_WIN}'
                  }
              },
              'bin': 'agentdb.exe',
              'checkver': {
                  'github': 'https://github.com/hvrcharon1/agentdb'
              },
              'autoupdate': {
                  'architecture': {
                      '64bit': {
                          'url': 'https://github.com/hvrcharon1/agentdb/releases/download/v\$version/agentdb-x86_64-pc-windows-msvc.zip'
                      }
                  },
                  'hash': {
                      'url': '\$baseurl/checksums-sha256.txt',
                      'regex': '\$sha256\\\\\\\s+agentdb-x86_64-pc-windows-msvc.zip'
                  }
              }
          }
          with open('bucket/agentdb.json', 'w') as f:
              json.dump(manifest, f, indent=2)
              f.write('\n')
          "

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add bucket/agentdb.json
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "Update agentdb to v${VERSION}"
          git push
        env:
          VERSION: ${{ github.event.client_payload.version }}
